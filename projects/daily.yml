# daily.yml — run triage.js on a schedule with GitHub Actions (Lesson 3).
# Put this file at .github/workflows/daily.yml in your repo,
# and add OPENROUTER_API_KEY under Settings → Secrets → Actions.
name: daily-triage
on:
  schedule:
    - cron: "0 7 * * *"   # every day at 07:00 UTC
  workflow_dispatch:       # adds a manual "Run workflow" button
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node triage.js
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
